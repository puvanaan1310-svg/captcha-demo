<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake CAPTCHA Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .captcha-box {
            border: 2px solid #ddd;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
            background: #f9f9f9;
        }

        .challenge {
            margin-bottom: 20px;
        }

        .challenge-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .challenge-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0),
                        linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            background-color: #f5f5f5;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.1);
            transform: skewX(-10deg) rotate(-5deg);
            font-family: 'Courier New', monospace;
            letter-spacing: 10px;
            margin-bottom: 15px;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
        }

        .refresh-btn:hover {
            opacity: 0.7;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .details {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: #666;
        }

        .detail-label {
            font-weight: 500;
        }

        .detail-value {
            color: #999;
            font-family: 'Courier New', monospace;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 4px;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-label {
            color: #333;
            font-size: 14px;
            line-height: 1.4;
        }

        .verify-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }

        .verify-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .verify-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-weight: 500;
            display: none;
            margin-bottom: 15px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .footer {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 20px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verify you're human</h1>
        <p class="subtitle">This is a fake CAPTCHA for demonstration purposes</p>

        <div class="message" id="message"></div>

        <div class="captcha-box">
            <div class="details">
                <div class="detail-item">
                    <span class="detail-label">Browser:</span>
                    <span class="detail-value" id="browser">Loading...</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">IP Address:</span>
                    <span class="detail-value" id="ipAddress">Loading...</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Device ID:</span>
                    <span class="detail-value" id="deviceId">Loading...</span>
                </div>
            </div>

            <div class="challenge">
                <div class="challenge-label">Enter the text you see below:</div>
                <div class="challenge-image" id="captchaImage">FAKE42</div>
                <button class="refresh-btn" title="Refresh" onclick="refreshCaptcha()">🔄</button>
            </div>

            <div class="input-group">
                <input type="text" id="captchaInput" placeholder="Enter text here" autocomplete="off">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="agreeCheckbox" class="checkbox">
                <label for="agreeCheckbox" class="checkbox-label">
                    I'm not a robot (but you can tell I'm lying)
                </label>
            </div>

            <button class="verify-btn" onclick="verifyCaptcha()">Verify</button>

            <div class="footer">
                <p>This is a <strong>fake CAPTCHA</strong> for educational/demo purposes only.</p>
                <p style="margin-top: 10px;">
                    <a href="https://www.google.com/recaptcha/" target="_blank">ReCAPTCHA</a> • 
                    <a href="javascript:location.reload()">Reset</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Initialize
        let currentCaptchaText = 'FAKE42';
        let minAttempts = 2;
        let currentAttempt = 0;

        // Browser detection
        function getBrowser() {
            const ua = navigator.userAgent;
            if (ua.indexOf('Chrome') > -1 && ua.indexOf('Chromium') === -1) return 'Chrome';
            if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) return 'Safari';
            if (ua.indexOf('Firefox') > -1) return 'Firefox';
            if (ua.indexOf('Edge') > -1) return 'Edge';
            if (ua.indexOf('Opera') > -1 || ua.indexOf('OPR') > -1) return 'Opera';
            return 'Unknown';
        }

        // Generate fake captcha text
        function generateCaptcha() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let text = '';
            for (let i = 0; i < 6; i++) {
                text += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return text;
        }

        // Initialize captcha
        function refreshCaptcha() {
            currentCaptchaText = generateCaptcha();
            const captchaImage = document.getElementById('captchaImage');
            captchaImage.textContent = currentCaptchaText;
            
            // Random rotation and skew
            const rotation = (Math.random() * 20) - 10;
            const skew = (Math.random() * 20) - 10;
            captchaImage.style.transform = `skewX(${skew}deg) rotate(${rotation}deg)`;
            
            document.getElementById('captchaInput').value = '';
            document.getElementById('agreeCheckbox').checked = false;
        }

        // Verify captcha
        function verifyCaptcha() {
            const input = document.getElementById('captchaInput').value.toUpperCase();
            const isChecked = document.getElementById('agreeCheckbox').checked;
            const messageEl = document.getElementById('message');

            currentAttempt++;

            if (currentAttempt < minAttempts) {
                const remaining = minAttempts - currentAttempt;
                messageEl.className = 'message error';
                messageEl.textContent = `❌ Try again. You need ${remaining} more attempt(s).`;
                return;
            }

            if (!isChecked) {
                messageEl.className = 'message error';
                messageEl.textContent = '❌ Please check the "I\'m not a robot" checkbox.';
                return;
            }

            if (input !== currentCaptchaText) {
                messageEl.className = 'message error';
                messageEl.textContent = '❌ Incorrect! The text did not match. Try again.';
                refreshCaptcha();
                currentAttempt = 0;
                return;
            }

            messageEl.className = 'message success';
            messageEl.textContent = '✅ Success! You have been verified (this is fake, remember?)';
            
            // Disable inputs after success
            document.getElementById('captchaInput').disabled = true;
            document.getElementById('agreeCheckbox').disabled = true;
            document.querySelector('.verify-btn').disabled = true;
        }

        // Fake device ID
        function generateDeviceId() {
            return 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            document.getElementById('browser').textContent = getBrowser();
            document.getElementById('ipAddress').textContent = '203.0.113.' + Math.floor(Math.random() * 256);
            document.getElementById('deviceId').textContent = generateDeviceId();
            refreshCaptcha();

            // Allow Enter key to verify
            document.getElementById('captchaInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyCaptcha();
            });
        });
    </script>
</body>
</html>
